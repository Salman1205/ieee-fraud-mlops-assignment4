global:
  scrape_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: fraud-inference-api-local
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: fraud-inference-api-k8s
    static_configs:
      - targets: ["fraud-inference-svc.fraud-mlops.svc.cluster.local:80"]
